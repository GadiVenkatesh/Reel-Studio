name: Auth Service CI
on:
  push:
    paths:
      - 'backend/auth-service/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build Auth Service
        run: |
          cd backend/auth-service
          mvn clean package
